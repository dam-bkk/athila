# ARGOS (infra name: athila) — isolated compose project; does not touch the
# shared /opt/apps stack. Publishes on the docker bridge gateway so Caddy reaches
# it at 172.18.0.1:3014, exactly like the pikko / nuance / trackspend apps.
# Container/image stay "athila" so in-place rebuilds never clash on port 3014.
services:
  athila:
    container_name: athila
    build:
      context: .
      dockerfile: Dockerfile
    image: athila
    ports:
      - "172.18.0.1:3014:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # Optional free API key → unlocks worldwide public webcams (else curated).
      WINDY_KEY: ${WINDY_KEY:-}
      # Optional free Cesium Ion token → 3D terrain + worldwide 3D buildings.
      CESIUM_TOKEN: ${CESIUM_TOKEN:-}
      # Optional free AISStream key → live maritime vessel positions.
      AISSTREAM_KEY: ${AISSTREAM_KEY:-}
    restart: unless-stopped
